<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RouteFlow</title>
  <meta name="description" content="여행 일정을 보기 편하게 정리하는 RouteFlow" />
  <meta name="theme-color" content="#FF3C00" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="RouteFlow" />
  <meta property="og:description" content="여행 일정을 보기 편하게 정리하는 RouteFlow" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F7F7F5; color: #1A1A1A; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; cursor: pointer; }
    select { font-family: inherit; }

    /* ── Layout ─────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .center-wrap { max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 24px; }

    /* ── Header ─────────────────────────────────────── */
    .header { background: #fff; border-bottom: 1px solid #E8E8E6; position: sticky; top: 0; z-index: 200; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 54px; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .logo { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 700; color: #1A1A1A; text-decoration: none; }
    .logo-icon { width: 26px; height: 26px; background: #FF3C00; border-radius: 6px; flex-shrink: 0; }

    /* ── Tab nav ─────────────────────────────────────── */
    .tab-nav { background: #fff; border-bottom: 1px solid #E8E8E6; }
    .tab-nav-inner { display: flex; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .tab-btn { padding: 12px 18px; border: none; background: none; font-size: 13px; font-weight: 500; color: #999; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; white-space: nowrap; }
    .tab-btn:hover { color: #1A1A1A; }
    .tab-btn.active { color: #FF3C00; border-bottom-color: #FF3C00; font-weight: 600; }

    /* ── Content ─────────────────────────────────────── */
    .content { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; transition: opacity .15s, background .15s; white-space: nowrap; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #FF3C00; color: #fff; }
    .btn-secondary { background: #F0F0EE; color: #444; }
    .btn-ghost { background: transparent; color: #888; border: 1.5px solid #E8E8E6; }
    .btn-danger { background: #FFF0F0; color: #CC0000; }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }

    /* ── Import button in header ─────────────────────── */
    #header-actions { display: flex; align-items: center; gap: 10px; }

    /* ── Empty state ─────────────────────────────────── */
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }
    .empty-icon { font-size: 44px; margin-bottom: 16px; }
    .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.7; }

    /* ── Stats strip ─────────────────────────────────── */
    .stats-strip { display: flex; gap: 24px; flex-wrap: wrap; padding: 14px 0 18px; border-bottom: 1px solid #E8E8E6; margin-bottom: 20px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; }
    .stat-value { font-size: 14px; font-weight: 700; }

    /* ── Filter bar ─────────────────────────────────── */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .chip { padding: 5px 13px; border-radius: 20px; border: 1.5px solid #E0E0DE; background: #fff; font-size: 12px; font-weight: 500; color: #666; transition: all .15s; }
    .chip:hover { border-color: #bbb; color: #333; }
    .chip.active { border-color: #FF3C00; background: #FF3C00; color: #fff; }

    /* ── Category badges ─────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; line-height: 1.5; }
    .b-이동  { background: #FFF0EB; color: #CC2E00; }
    .b-관광  { background: #EBF4FF; color: #0057CC; }
    .b-숙소  { background: #EDFAF3; color: #007A48; }
    .b-식사  { background: #FFF5EB; color: #CC5500; }
    .b-카페  { background: #FFFAEB; color: #AA7700; }
    .b-쇼핑  { background: #F5EBFF; color: #7700BB; }
    .b-체험  { background: #EBFBFF; color: #006688; }
    .b-기타  { background: #F0F0EE; color: #666; }

    /* ── Transport badge ─────────────────────────────── */
    .t-badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; background: #F0F0EE; color: #555; }

    /* ── Trip selector ─────────────────────────────────── */
    .trip-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .trip-select { padding: 7px 12px; border: 1.5px solid #E0E0DE; border-radius: 8px; font-size: 13px; font-weight: 500; background: #fff; outline: none; min-width: 180px; }
    .trip-select:focus { border-color: #FF3C00; }

    /* ── Day label ─────────────────────────────────────── */
    .day-label { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; margin-top: 6px; }
    .day-badge { background: #FF3C00; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .day-date { font-size: 13px; color: #666; font-weight: 500; }
    .day-group { margin-bottom: 24px; }

    /* ── Schedule table ─────────────────────────────── */
    .sched-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .sched-table th { background: #F7F7F5; padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #EEEEEC; }
    .sched-table td { padding: 9px 12px; border-bottom: 1px solid #F2F2F0; font-size: 13px; vertical-align: middle; }
    .sched-table tr:last-child td { border-bottom: none; }
    .sched-table tr:hover td { background: #FAFAF8; }
    .sched-table .col-time { width: 52px; font-size: 12px; color: #888; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .sched-table .col-cat  { width: 68px; }
    .sched-table .col-place { font-weight: 600; }
    .sched-table .col-memo  { color: #555; }
    .sched-table .col-trans { width: 90px; }

    /* ── Route flow ─────────────────────────────────── */
    .route-col { max-width: 520px; }
    .flow-node { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.05); border: 1px solid #EEEEEC; margin-bottom: 2px; }
    .flow-node:hover { border-color: #FF3C00; }
    .flow-dot { width: 10px; height: 10px; border-radius: 50%; background: #D0D0CE; flex-shrink: 0; margin-top: 4px; border: 2px solid #fff; box-shadow: 0 0 0 1.5px #D0D0CE; }
    .flow-dot.movement { background: #FF3C00; box-shadow: 0 0 0 1.5px #FF3C00; }
    .flow-node-body { flex: 1; min-width: 0; }
    .flow-node-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .flow-node-time { font-size: 11px; color: #999; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .flow-node-place { font-weight: 600; font-size: 14px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .flow-node-memo { font-size: 12px; color: #888; margin-top: 2px; }
    .flow-connector { display: flex; align-items: stretch; gap: 0; padding: 0 0 0 5px; margin: 2px 0; }
    .flow-line { width: 2px; background: #EEEEEC; margin: 0 9px; flex-shrink: 0; min-height: 20px; }
    .flow-conn-body { display: flex; align-items: center; gap: 10px; padding: 5px 8px; font-size: 12px; color: #888; }
    .flow-conn-transport { font-weight: 600; color: #FF3C00; font-size: 12px; }
    .flow-conn-duration { color: #999; }

    /* ── Budget ─────────────────────────────────────── */
    .budget-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .budget-card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .budget-card-label { font-size: 10px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .budget-card-value { font-size: 20px; font-weight: 700; }
    .budget-card.primary .budget-card-value { color: #FF3C00; }

    .cat-bar-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 24px; }
    .cat-bar-row { display: flex; align-items: center; gap: 12px; }
    .cat-bar-name { width: 55px; font-size: 12px; color: #666; text-align: right; flex-shrink: 0; }
    .cat-bar-track { flex: 1; height: 7px; background: #F0F0EE; border-radius: 4px; overflow: hidden; }
    .cat-bar-fill { height: 100%; background: #FF3C00; border-radius: 4px; transition: width .4s; }
    .cat-bar-amt { font-size: 12px; color: #888; width: 100px; text-align: right; flex-shrink: 0; white-space: nowrap; }

    .budget-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .budget-table th { background: #F7F7F5; padding: 8px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #EEEEEC; }
    .budget-table td { padding: 10px 14px; border-bottom: 1px solid #F2F2F0; font-size: 13px; vertical-align: middle; }
    .budget-table tr:last-child td { border-bottom: none; }
    .budget-table .amount { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .budget-subtotal td { background: #FAFAF8; font-size: 12px; }
    .budget-total td { background: #FFF5F2; border-top: 2px solid #FF3C00 !important; }
    .budget-total .amount { color: #FF3C00; font-size: 15px; }

    .section-sub { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .5px; margin: 20px 0 10px; }

    /* ── Modal ─────────────────────────────────────── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 660px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 24px 64px rgba(0,0,0,.2); overflow: hidden; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #EEEEEC; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 18px; color: #999; line-height: 1; padding: 4px; }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #EEEEEC; display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }

    .paste-area { width: 100%; height: 200px; border: 1.5px solid #E0E0DE; border-radius: 10px; padding: 12px; font-family: 'Inter', monospace; font-size: 12px; line-height: 1.7; resize: vertical; outline: none; transition: border-color .15s; color: #333; }
    .paste-area:focus { border-color: #FF3C00; }
    .paste-hint { font-size: 12px; color: #999; margin-bottom: 10px; line-height: 1.6; }

    /* ── Parse preview ─────────────────────────────── */
    .preview-box { background: #F7F7F5; border-radius: 10px; padding: 16px; margin-top: 16px; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .preview-field-label { font-size: 10px; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .preview-field-value { font-size: 13px; font-weight: 600; }
    .cat-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .cat-chip-label { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1.5px solid #E0E0DE; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; user-select: none; }
    .cat-chip-label.checked { border-color: #FF3C00; background: #FFF0EB; color: #CC2E00; }
    .cat-chip-label input { display: none; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 720px) {
      .content { padding: 16px; }
      .header-inner, .tab-nav-inner { padding: 0 16px; }
      .preview-grid { grid-template-columns: repeat(2, 1fr); }
      .budget-cards { grid-template-columns: repeat(2, 1fr); }
      .stats-strip { gap: 16px; }
      .sched-table .col-memo { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ──────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon"></div>
        RouteFlow
      </a>
      <div id="header-actions"></div>
    </div>
  </header>

  <!-- ── Tab nav ─────────────────────────────────── -->
  <nav class="tab-nav">

      <button class="tab-btn active" data-tab="schedule" onclick="switchTab('schedule')">일정</button>
      <button class="tab-btn" data-tab="route" onclick="switchTab('route')">이동경로</button>

  <!-- ── Content ─────────────────────────────────── -->

</div>

<!-- ── Import Modal ────────────────────────────── -->
<div class="modal-overlay" id="modal-import" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✈️ 여행 가져오기</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="paste-hint">ChatGPT에서 생성한 여행 요약 텍스트를 아래에 붙여넣고 <strong>분석하기</strong>를 눌러주세요.</p>
      <textarea class="paste-area" id="paste-input" placeholder="✈️ 여행 요약&#10;&#10;📅 2026-12-31 ~ 2027-01-03&#10;📍 일본&#10;👥 가족&#10;💰 총 경비: 296,810원&#10;&#10;📋 여행 일정&#10;&#10;[2026-12-31]&#10;13:30 | 신치토세 공항 | 일본 도착 | 이동 | 버스&#10;..."></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="btn btn-primary" onclick="parseAndPreview()">분석하기</button>
      </div>

      <div id="preview-wrap" style="display:none">
        <div class="preview-box">
          <div class="preview-grid" id="preview-meta"></div>
          <div class="preview-field-label" style="margin-bottom:8px;">가져올 분류 선택</div>
          <div class="cat-chips" id="preview-cats"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="btn-confirm" style="display:none" onclick="confirmImport()">일정 가져오기</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// IndexedDB
// ═══════════════════════════════════════════════
let _db = null;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('routeflow_db', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('trips')) {
        d.createObjectStore('trips', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(); };
    req.onerror = e => reject(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((ok, err) => {
    const req = _db.transaction('trips', 'readonly').objectStore('trips').getAll();
    req.onsuccess = e => ok(e.target.result || []);
    req.onerror = e => err(e.target.error);
  });
}

function dbPut(trip) {
  return new Promise((ok, err) => {
    const tx = _db.transaction('trips', 'readwrite');
    tx.objectStore('trips').put(trip);
    tx.oncomplete = ok;
    tx.onerror = e => err(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((ok, err) => {
    const tx = _db.transaction('trips', 'readwrite');
    tx.objectStore('trips').delete(id);
    tx.oncomplete = ok;
    tx.onerror = e => err(e.target.error);
  });
}

// ═══════════════════════════════════════════════
// App state
// ═══════════════════════════════════════════════
let trips = [];
let activeTrip = null;
let currentTab = 'schedule';
let schedFilter = '전체';
let _parsed = null;

// ═══════════════════════════════════════════════
// Parser
// ═══════════════════════════════════════════════
function parseTravel(text) {
  const trip = {
    id: 'trip_' + Date.now(),
    name: '',
    country: '',
    companions: '',
    dateRange: { start: '', end: '' },
    totalExpense: 0,
    schedule: [],
    expenses: [],
  };

  const lines = text.split('\n').map(l => l.trim());
  let mode = null; // null | 'schedule' | 'expense'
  let curDate = '';
  let sidx = 0, eidx = 0;

  for (const line of lines) {
    if (!line) continue;

    // Section markers
    if (/📋/.test(line) && /일정/.test(line)) { mode = 'schedule'; continue; }
    if (/💸/.test(line) && /지출/.test(line)) { mode = 'expense'; continue; }

    // Meta (any position before/after markers — scan all)
    const dateM = line.match(/📅\s*(\d{4}-\d{2}-\d{2})\s*[~–-]\s*(\d{4}-\d{2}-\d{2})/);
    if (dateM) trip.dateRange = { start: dateM[1], end: dateM[2] };

    const cntryM = line.match(/📍\s*(.+)/);
    if (cntryM) trip.country = cntryM[1].trim();

    const compM = line.match(/👥\s*(.+)/);
    if (compM) trip.companions = compM[1].trim();

    const expM = line.match(/💰.*?([\d,]+)\s*원/);
    if (expM) trip.totalExpense = parseInt(expM[1].replace(/,/g, ''));

    if (mode === 'schedule') {
      const dhM = line.match(/^\[(\d{4}-\d{2}-\d{2})\]$/);
      if (dhM) { curDate = dhM[1]; continue; }

      const parts = line.split('|').map(p => p.trim());
      if (parts.length >= 4 && /^\d{1,2}:\d{2}$/.test(parts[0])) {
        trip.schedule.push({
          id: 's' + (sidx++),
          date: curDate,
          time: parts[0],
          place: parts[1] || '',
          memo: parts[2] || '',
          category: parts[3] || '기타',
          transport: parts[4] || null,
          mapsUrl: null,
        });
      }
    }

    if (mode === 'expense') {
      const parts = line.split('|').map(p => p.trim());
      if (parts.length >= 4 && /^\d{4}-\d{2}-\d{2}$/.test(parts[0])) {
        const amtM = parts[3].match(/([\d,]+)\s*원/);
        if (amtM) {
          trip.expenses.push({
            id: 'e' + (eidx++),
            date: parts[0],
            category: parts[1] || '기타',
            title: parts[2] || '',
            amount: parseInt(amtM[1].replace(/,/g, '')),
          });
        }
      }
    }
  }

  // Auto name
  const c = trip.country || '여행';
  if (trip.dateRange.start && trip.dateRange.end) {
    const days = Math.round((new Date(trip.dateRange.end) - new Date(trip.dateRange.start)) / 86400000) + 1;
    trip.name = `${c} ${days}일`;
  } else {
    trip.name = c;
  }

  return trip;
}

function getCategories(trip) {
  return [...new Set((trip.schedule || []).map(s => s.category))].filter(Boolean);
}

// ═══════════════════════════════════════════════
// Modal
// ═══════════════════════════════════════════════
function openModal() {
  _parsed = null;
  document.getElementById('paste-input').value = '';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('btn-confirm').style.display = 'none';
  document.getElementById('modal-import').classList.add('open');
  setTimeout(() => document.getElementById('paste-input').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-import').classList.remove('open');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-import')) closeModal();
}

function parseAndPreview() {
  const text = document.getElementById('paste-input').value;
  if (!text.trim()) { alert('텍스트를 붙여넣어 주세요.'); return; }

  _parsed = parseTravel(text);
  const cats = getCategories(_parsed);
  const days = (_parsed.dateRange.start && _parsed.dateRange.end)
    ? Math.round((new Date(_parsed.dateRange.end) - new Date(_parsed.dateRange.start)) / 86400000) + 1
    : '-';

  document.getElementById('preview-meta').innerHTML = `
    <div>
      <div class="preview-field-label">여행지</div>
      <div class="preview-field-value">${_parsed.country || '-'}</div>
    </div>
    <div>
      <div class="preview-field-label">기간</div>
      <div class="preview-field-value">${_parsed.dateRange.start || '-'} ~ ${_parsed.dateRange.end || '-'}</div>
    </div>
    <div>
      <div class="preview-field-label">인원</div>
      <div class="preview-field-value">${_parsed.companions || '-'}</div>
    </div>
    <div>
      <div class="preview-field-label">일정 수</div>
      <div class="preview-field-value">${_parsed.schedule.length}개 · ${days}일</div>
    </div>
    <div>
      <div class="preview-field-label">총 경비</div>
      <div class="preview-field-value">${_parsed.totalExpense.toLocaleString('ko-KR')}원</div>
    </div>
    <div>
      <div class="preview-field-label">지출 항목</div>
      <div class="preview-field-value">${_parsed.expenses.length}개</div>
    </div>
  `;

  document.getElementById('preview-cats').innerHTML = cats.map(cat => `
    <label class="cat-chip-label checked" id="ck-${CSS.escape(cat)}">
      <input type="checkbox" value="${cat}" checked onchange="toggleCat(this,'${cat}')">
      ${cat}
    </label>
  `).join('');

  document.getElementById('preview-wrap').style.display = 'block';
  document.getElementById('btn-confirm').style.display = 'inline-flex';
}

function toggleCat(el, cat) {
  const label = document.getElementById('ck-' + CSS.escape(cat));
  if (el.checked) label.classList.add('checked');
  else label.classList.remove('checked');
}

async function confirmImport() {
  if (!_parsed) return;
  const selected = [...document.querySelectorAll('#preview-cats input:checked')].map(i => i.value);
  const finalTrip = {
    ..._parsed,
    schedule: _parsed.schedule.filter(s => selected.includes(s.category)),
  };
  await dbPut(finalTrip);
  trips = await dbGetAll();
  activeTrip = finalTrip;
  schedFilter = '전체';
  closeModal();
  renderAll();
}

// ═══════════════════════════════════════════════
// Navigation
// ═══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  renderTab(tab);
  renderHeaderActions();
}

function renderHeaderActions() {
  const el = document.getElementById('header-actions');
  el.innerHTML = currentTab === 'schedule'
    ? `<button class="btn btn-primary" onclick="openModal()">✈️ 여행 가져오기</button>`
    : '';
}

// ═══════════════════════════════════════════════
// Trip helpers
// ═══════════════════════════════════════════════
function tripSelectorHTML() {
  if (trips.length === 0) return '';
  return `
    <div class="trip-selector">
      <select class="trip-select" onchange="selectTrip(this.value)">
        ${trips.map(t => `<option value="${t.id}" ${activeTrip && activeTrip.id === t.id ? 'selected' : ''}>${escH(t.name)}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-sm" onclick="deleteTrip()">삭제</button>
    </div>
  `;
}

function selectTrip(id) {
  activeTrip = trips.find(t => t.id === id) || null;
  schedFilter = '전체';
  renderAll();
}

async function deleteTrip() {
  if (!activeTrip) return;
  if (!confirm(`"${activeTrip.name}" 여행을 삭제할까요?`)) return;
  await dbDelete(activeTrip.id);
  trips = await dbGetAll();
  activeTrip = trips[0] || null;
  schedFilter = '전체';
  renderAll();
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function dayN(dateStr, start) {
  if (!start || !dateStr) return null;
  return Math.round((new Date(dateStr) - new Date(start)) / 86400000) + 1;
}

function dateLabel(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const days = ['일','월','화','수','목','금','토'];
  return `${dateStr.slice(5)} (${days[d.getDay()]})`;
}

function timeDiff(t1, t2) {
  if (!t1 || !t2) return null;
  const [h1, m1] = t1.split(':').map(Number);
  const [h2, m2] = t2.split(':').map(Number);
  const diff = (h2 - h1) * 60 + (m2 - m1);
  if (diff <= 0) return null;
  const h = Math.floor(diff / 60), m = diff % 60;
  return h > 0 ? `${h}시간${m > 0 ? ' ' + m + '분' : ''}` : `${m}분`;
}

// ═══════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════
function renderAll() {
  renderTab(currentTab);
  renderHeaderActions();
}

function renderTab(tab) {
  if (tab === 'schedule') renderSchedule();
  else if (tab === 'route') renderRoute();
  else if (tab === 'budget') renderBudget();
}

// ── Schedule ─────────────────────────────────
function renderSchedule() {
  const el = document.getElementById('tab-schedule');
  if (!activeTrip) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✈️</div>
        <div class="empty-title">여행 일정이 없어요</div>
        <div class="empty-sub">상단의 '여행 가져오기' 버튼으로<br>ChatGPT 여행 요약을 불러오세요.</div>
        <button class="btn btn-primary" onclick="openModal()">✈️ 여행 가져오기</button>
      </div>`;
    return;
  }

  const t = activeTrip;
  const schedule = t.schedule || [];
  const allCats = ['전체', ...new Set(schedule.map(s => s.category))];
  const filtered = schedFilter === '전체' ? schedule : schedule.filter(s => s.category === schedFilter);

  // Group by date
  const byDate = {};
  filtered.forEach(s => {
    const d = s.date || '날짜 미정';
    (byDate[d] = byDate[d] || []).push(s);
  });
  const sortedDates = Object.keys(byDate).sort();

  const statsHTML = `
    <div class="stats-strip">
      <div class="stat"><div class="stat-label">여행지</div><div class="stat-value">${escH(t.country || '-')}</div></div>
      <div class="stat"><div class="stat-label">기간</div><div class="stat-value">${t.dateRange.start || '-'} ~ ${t.dateRange.end || '-'}</div></div>
      <div class="stat"><div class="stat-label">인원</div><div class="stat-value">${escH(t.companions || '-')}</div></div>
      <div class="stat"><div class="stat-label">일정 수</div><div class="stat-value">${schedule.length}개</div></div>
    </div>`;

  const filterHTML = `
    <div class="filter-bar">
      ${allCats.map(c => `<button class="chip${schedFilter === c ? ' active' : ''}" onclick="setFilter('${escH(c)}')">${escH(c)}</button>`).join('')}
    </div>`;

  const tableGroups = sortedDates.map(date => {
    const items = [...byDate[date]].sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    const n = dayN(date, t.dateRange.start);
    const dl = dateLabel(date);
    const rows = items.map(s => `
      <tr>
        <td class="col-time">${escH(s.time || '--:--')}</td>
        <td class="col-cat"><span class="badge b-${escH(s.category || '기타')}">${escH(s.category || '기타')}</span></td>
        <td class="col-place">${escH(s.place || '')}</td>
        <td class="col-memo">${escH(s.memo || '')}</td>
        <td class="col-trans">${s.transport ? `<span class="t-badge">${escH(s.transport)}</span>` : ''}</td>
      </tr>`).join('');

    return `
      <div class="day-group">
        <div class="day-label">
          ${n ? `<span class="day-badge">Day ${n}</span>` : ''}
          <span class="day-date">${dl}</span>
        </div>
        <table class="sched-table">
          <thead><tr>
            <th class="col-time">시간</th>
            <th class="col-cat">분류</th>
            <th>장소</th>
            <th class="col-memo">메모</th>
            <th class="col-trans">교통수단</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }).join('');

  el.innerHTML = tripSelectorHTML() + statsHTML + filterHTML +
    (tableGroups || `<p style="color:#999;text-align:center;padding:40px 0;">해당 분류의 일정이 없습니다.</p>`);
}

function setFilter(cat) {
  schedFilter = cat;
  renderSchedule();
}

// ── Route ─────────────────────────────────────
function renderRoute() {
  const el = document.getElementById('tab-route');
  if (!activeTrip || !(activeTrip.schedule || []).length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🗺️</div>
        <div class="empty-title">이동경로가 없어요</div>
        <div class="empty-sub">여행을 가져오면 이동 흐름을 확인할 수 있어요.</div>
      </div>`;
    return;
  }

  const t = activeTrip;
  const schedule = [...t.schedule].sort((a, b) => (a.date + (a.time || '')).localeCompare(b.date + (b.time || '')));

  const byDate = {};
  schedule.forEach(s => {
    const d = s.date || '날짜 미정';
    (byDate[d] = byDate[d] || []).push(s);
  });
  const sortedDates = Object.keys(byDate).sort();

  const daysHTML = sortedDates.map(date => {
    const items = byDate[date];
    const n = dayN(date, t.dateRange.start);
    const dl = dateLabel(date);

    const nodesHTML = items.map((item, idx) => {
      const next = items[idx + 1];
      const isMovement = item.category === '이동';
      const dur = next ? timeDiff(item.time, next.time) : null;

      const nodeHTML = `
        <div class="flow-node">
          <div class="flow-dot${isMovement ? ' movement' : ''}"></div>
          <div class="flow-node-body">
            <div class="flow-node-top">
              <span class="flow-node-time">${escH(item.time || '--:--')}</span>
              <span class="flow-node-place">${escH(item.place || '')}</span>
              ${item.transport ? `<span class="t-badge">${escH(item.transport)}</span>` : ''}
              <span class="badge b-${escH(item.category || '기타')}" style="font-size:10px;margin-left:auto;">${escH(item.category || '기타')}</span>
            </div>
            ${item.memo ? `<div class="flow-node-memo">${escH(item.memo)}</div>` : ''}
          </div>
        </div>`;

      let connHTML = '';
      if (next) {
        const transport = next.transport || (next.category === '이동' ? null : null);
        connHTML = `
          <div class="flow-connector">
            <div class="flow-line"></div>
            <div class="flow-conn-body">
              ${transport ? `<span class="flow-conn-transport">↓ ${escH(transport)}</span>` : '<span style="color:#ccc;font-size:12px;">↓</span>'}
              ${dur ? `<span class="flow-conn-duration">${dur}</span>` : ''}
            </div>
          </div>`;
      }

      return nodeHTML + connHTML;
    }).join('');

    return `
      <div style="margin-bottom:32px;">
        <div class="day-label" style="margin-bottom:14px;">
          ${n ? `<span class="day-badge">Day ${n}</span>` : ''}
          <span class="day-date">${dl}</span>
        </div>
        <div class="route-col">${nodesHTML}</div>
      </div>`;
  }).join('');

  el.innerHTML = tripSelectorHTML() + daysHTML;
}

// ── Budget ─────────────────────────────────────
function renderBudget() {
  const el = document.getElementById('tab-budget');
  if (!activeTrip || !(activeTrip.expenses || []).length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">💰</div>
        <div class="empty-title">지출 내역이 없어요</div>
        <div class="empty-sub">여행을 가져오면 예산이 자동으로 생성됩니다.</div>
      </div>`;
    return;
  }

  const t = activeTrip;
  const expenses = t.expenses;
  const total = expenses.reduce((s, e) => s + e.amount, 0);

  // Category totals
  const catMap = {};
  expenses.forEach(e => { catMap[e.category] = (catMap[e.category] || 0) + e.amount; });
  const catsSorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);

  const days = (t.dateRange.start && t.dateRange.end)
    ? Math.round((new Date(t.dateRange.end) - new Date(t.dateRange.start)) / 86400000) + 1
    : null;

  const cardsHTML = `
    <div class="budget-cards">
      <div class="budget-card primary">
        <div class="budget-card-label">총 지출</div>
        <div class="budget-card-value">${total.toLocaleString('ko-KR')}원</div>
      </div>
      <div class="budget-card">
        <div class="budget-card-label">항목 수</div>
        <div class="budget-card-value">${expenses.length}개</div>
      </div>
      <div class="budget-card">
        <div class="budget-card-label">카테고리</div>
        <div class="budget-card-value">${catsSorted.length}종</div>
      </div>
      ${days ? `
      <div class="budget-card">
        <div class="budget-card-label">1일 평균</div>
        <div class="budget-card-value">${Math.round(total / days).toLocaleString('ko-KR')}원</div>
      </div>` : ''}
    </div>`;

  const barsHTML = `
    <div class="section-sub">카테고리별 지출</div>
    <div class="cat-bar-list">
      ${catsSorted.map(([cat, amt]) => `
        <div class="cat-bar-row">
          <div class="cat-bar-name">${escH(cat)}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round(amt / total * 100)}%"></div></div>
          <div class="cat-bar-amt">${amt.toLocaleString('ko-KR')}원</div>
        </div>`).join('')}
    </div>`;

  // Table by date
  const byDate = {};
  expenses.forEach(e => {
    const d = e.date || '날짜 미정';
    (byDate[d] = byDate[d] || []).push(e);
  });
  const sortedDates = Object.keys(byDate).sort();

  const tableRows = sortedDates.map(date => {
    const items = byDate[date];
    const dayTotal = items.reduce((s, e) => s + e.amount, 0);
    const itemRows = items.map((e, i) => `
      <tr>
        <td style="color:#888;font-size:12px;">${i === 0 ? date : ''}</td>
        <td><span class="badge b-${escH(e.category || '기타')}">${escH(e.category || '기타')}</span></td>
        <td>${escH(e.title)}</td>
        <td class="amount">${e.amount.toLocaleString('ko-KR')}원</td>
      </tr>`).join('');

    return itemRows + `
      <tr class="budget-subtotal">
        <td colspan="3" style="text-align:right;color:#999;">${date} 소계</td>
        <td class="amount" style="color:#FF3C00;">${dayTotal.toLocaleString('ko-KR')}원</td>
      </tr>`;
  }).join('');

  const tableHTML = `
    <div class="section-sub">지출 내역</div>
    <table class="budget-table">
      <thead><tr>
        <th style="width:100px">날짜</th>
        <th style="width:80px">카테고리</th>
        <th>항목</th>
        <th style="width:110px;text-align:right">금액</th>
      </tr></thead>
      <tbody>
        ${tableRows}
        <tr class="budget-total">
          <td colspan="3" style="font-weight:700;text-align:right;">합계</td>
          <td class="amount">${total.toLocaleString('ko-KR')}원</td>
        </tr>
      </tbody>
    </table>`;

  el.innerHTML = tripSelectorHTML() + cardsHTML + barsHTML + tableHTML;
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
async function main() {
  await initDB();
  trips = await dbGetAll();
  activeTrip = trips[0] || null;
  renderAll();

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

main().catch(console.error);
</script>
